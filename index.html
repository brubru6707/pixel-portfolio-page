    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /*
         * Layering plan (fixes game-world-over-iframe bugs):
         *   canvas (game world)        z: auto (bottom)
         *   .world-preview             z: 5    (small in-world previews)
         *   #mode-toggle               z: 1500
         *   #project-modal             z: 2000
         *   .subpage-frame             z: 3000 (full "sub-page")
         *   .subpage-esc               z: 3500 (back button)
         */
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        img {
            image-rendering: pixelated;
        }

        /* Small in-world previews (subdomain iframes/snapshots + computer screen) */
        .world-preview {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            border: 2px solid white;
            background-color: #000;
            transition: box-shadow 0.7s ease;
        }
        body.mode-3d .world-preview {
            box-shadow: 3px 3px 0 #6a6a6a, 6px 6px 0 #4c4c4c, 9px 9px 0 #303030;
        }
        body.mode-3d .world-preview--scaled {
            /* These live inside a scale() transform, so shadows need bigger px values */
            box-shadow: 14px 14px 0 #6a6a6a, 28px 28px 0 #4c4c4c, 42px 42px 0 #303030;
        }
        /* Never let world previews bleed over an open sub-page or modal */
        body.subpage-open .world-preview,
        body.modal-open .world-preview {
            display: none !important;
        }
        body.subpage-open #mode-toggle,
        body.modal-open #mode-toggle {
            display: none;
        }

        /* First-person (DOOM) mode: the raycaster overlay owns the screen, so
           hide the DOM world previews behind it. Also hide the overlay + its
           slider panel whenever a sub-page or modal is open. */
        body.mode-doom .world-preview {
            display: none !important;
        }
        body.subpage-open #doom-canvas,
        body.modal-open #doom-canvas,
        body.subpage-open #doom-controls,
        body.modal-open #doom-controls {
            display: none !important;
        }

        /* Full-screen sub-page shown after cutting down an entity */
        .subpage-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background: #000;
            z-index: 3000;
        }
        /* Clean pixel "BACK" button for sub-pages (replaces the esc-key image) */
        .subpage-back {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            right: 16px;
            z-index: 3500;
            padding: 12px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* 2D / 3D world mode toggle */
        #mode-toggle {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: 20px;
            width: 64px;
            height: 64px;
            z-index: 1500;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            line-height: 1;
            color: #c6ff33;
            background: #1b1b2f;
            border: 3px solid #c6ff33;
            box-shadow: 4px 4px 0 #000;
            cursor: pointer;
            image-rendering: pixelated;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #mode-toggle:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0 #000;
        }
        /* Clean "flip to the other dimension" instead of the old 360 spin */
        #mode-toggle.flipping {
            animation: modeFlip 0.3s ease;
        }
        @keyframes modeFlip {
            0%   { transform: perspective(240px) rotateY(0deg); }
            50%  { transform: perspective(240px) rotateY(90deg); }
            100% { transform: perspective(240px) rotateY(0deg); }
        }
        @media (max-width: 600px) {
            #mode-toggle {
                width: 52px;
                height: 52px;
                font-size: 11px;
            }
        }

        /* ---------------------------------------------------------------
           Stable DOM HUD (replaces the buggy floating F / ESC Phaser
           sprites). Fixed positions instead of per-frame repositioning.
           --------------------------------------------------------------- */
        .pixel-hud-btn {
            font-family: 'Press Start 2P', monospace;
            color: #c6ff33;
            background: #1b1b2f;
            border: 3px solid #c6ff33;
            box-shadow: 4px 4px 0 #000;
            image-rendering: pixelated;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .pixel-hud-btn:active,
        .pixel-hud-btn.pressed {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0 #000;
        }

        /* Action / chop button — the universal "interact" control */
        #action-btn {
            position: fixed;
            bottom: max(96px, calc(env(safe-area-inset-bottom) + 96px));
            right: 20px;
            width: 76px;
            height: 76px;
            font-size: 28px;
            z-index: 1500;
            flex-direction: column;
            gap: 3px;
            line-height: 1;
        }
        #action-btn .action-label {
            font-size: 8px;
            color: #7ea82a;
        }
        /* Axe icon cropped from the first frame of the 4-frame axe spritesheet
           (48x15). Used instead of a ⚔ glyph, which the pixel font lacks. */
        .axe-icon {
            display: inline-block;
            height: 1.2em;
            aspect-ratio: 12 / 15;
            vertical-align: middle;
            background: url('assets/axe.png') left center / auto 100% no-repeat;
            image-rendering: pixelated;
        }
        #action-btn .axe-icon { height: 34px; }
        .tutorial-key .axe-icon { height: 26px; }
        .tutorial-row b .axe-icon { height: 15px; }
        /* Subtle highlight when in range (the real "you can chop" cue is the
           stream of little green particles flowing out of the button — see
           .axe-particle below, spawned from JS). */
        #action-btn.hint {
            color: #eaffb0;
            border-color: #eaffb0;
        }
        #action-btn.hint .action-label { color: #eaffb0; }

        /* Little green pixels that flow out of the action button while it glows */
        .axe-particle {
            position: fixed;
            background: #c6ff33;
            box-shadow: 0 0 3px #c6ff33;
            image-rendering: pixelated;
            pointer-events: none;
            z-index: 1499;
            animation: axeParticleFly 0.85s ease-out forwards;
        }
        @keyframes axeParticleFly {
            0%   { opacity: 0; transform: translate(0, 0) scale(1); }
            18%  { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--dx, 0), var(--dy, -60px)) scale(0.25); }
        }
        @media (max-width: 600px) {
            #action-btn { width: 66px; height: 66px; font-size: 24px; }
        }

        /* DOOM first-person on-screen movement pad (touch devices, 3D only) */
        #doom-touch {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 20px;
            z-index: 1500;
            display: none;
            grid-template-columns: repeat(3, 58px);
            grid-template-rows: repeat(3, 58px);
            gap: 6px;
        }
        #doom-touch .pixel-hud-btn { font-size: 22px; }
        #doom-touch [data-doom="fwd"]   { grid-area: 1 / 2; }
        #doom-touch [data-doom="left"]  { grid-area: 2 / 1; }
        #doom-touch [data-doom="right"] { grid-area: 2 / 3; }
        #doom-touch [data-doom="back"]  { grid-area: 3 / 2; }
        body.touch.mode-doom #doom-touch { display: grid; }
        @media (max-width: 600px) {
            #doom-touch { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
        }

        /* Small "?" button to reopen the controls tutorial (2D only) */
        #help-btn {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 20px;
            width: 44px;
            height: 44px;
            font-size: 18px;
            z-index: 1500;
        }
        body.mode-doom #help-btn { display: none; }

        /* Music on/off toggle — sits right next to the "?" button */
        #music-btn {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 74px;
            width: 44px;
            height: 44px;
            padding: 0;
            z-index: 1500;
        }
        body.mode-doom #music-btn { display: none; }
        .music-icon {
            display: inline-block;
            width: 26px;
            height: 26px;
            background: center / contain no-repeat;
            /* Chunky pixel-block speaker: a stepped cone made of square blocks
               plus two blocky sound-waves — reads as retro pixel art, not a
               thin vector line. */
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'><rect x='1' y='6' width='2' height='4' fill='%23c6ff33'/><rect x='3' y='5' width='2' height='6' fill='%23c6ff33'/><rect x='5' y='4' width='2' height='8' fill='%23c6ff33'/><rect x='7' y='2' width='2' height='12' fill='%23c6ff33'/><rect x='10' y='6' width='2' height='4' fill='%23c6ff33'/><rect x='13' y='4' width='2' height='8' fill='%23c6ff33'/></svg>");
        }
        #music-btn.off {
            border-color: #6a6a78;
            color: #6a6a78;
        }

        /* SFX mute toggle — footsteps/chop/smash/etc., independent of music.
           Sits right after the music button. */
        #sfx-btn {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 128px;
            width: 44px;
            height: 44px;
            padding: 0;
            z-index: 1500;
        }
        body.mode-doom #sfx-btn { display: none; }
        .sfx-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: center / contain no-repeat;
            /* Speaker cone + equalizer bars — distinct from music's curved
               sound-wave icon, since this mutes chop/footstep/smash SFX, not
               the chiptune loop. */
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M1 6 L4 6 L8 2 L8 14 L4 10 L1 10 Z' fill='%23c6ff33'/><rect x='10' y='6' width='1.4' height='4' fill='%23c6ff33'/><rect x='12.4' y='4' width='1.4' height='8' fill='%23c6ff33'/><rect x='14.8' y='7' width='1.2' height='2' fill='%23c6ff33'/></svg>");
        }
        #sfx-btn.off {
            border-color: #6a6a78;
            color: #6a6a78;
        }
        #sfx-btn.off .sfx-icon {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M1 6 L4 6 L8 2 L8 14 L4 10 L1 10 Z' fill='%23888'/><path d='M10 4 L15 12' stroke='%23ff5555' stroke-width='1.7'/><path d='M15 4 L10 12' stroke='%23ff5555' stroke-width='1.7'/></svg>");
        }

        /* Bottom-left HUD row: gear (leftmost) → exit → game modes, all inside
           one flex container so button widths (which vary by language) can
           never overlap each other via stale hardcoded left offsets. */
        #bottomleft-hud {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 20px;
            z-index: 1500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        body.mode-doom #bottomleft-hud { display: none; }

        /* Exit button — clears the visitor choice + reloads. */
        #exit-btn {
            height: 34px;
            padding: 0 12px;
            font-size: 12px;
        }

        /* Settings (gear icon) — theme, language, sound + how-to-play. */
        #gear-btn {
            width: 34px;
            height: 34px;
            padding: 0;
        }
        .gear-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: center / contain no-repeat;
            image-rendering: pixelated;
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'><g fill='%23c6ff33'><rect x='6' y='0' width='4' height='2'/><rect x='6' y='14' width='4' height='2'/><rect x='0' y='6' width='2' height='4'/><rect x='14' y='6' width='2' height='4'/><rect x='2' y='2' width='2' height='2'/><rect x='12' y='2' width='2' height='2'/><rect x='2' y='12' width='2' height='2'/><rect x='12' y='12' width='2' height='2'/><rect x='4' y='4' width='8' height='8'/></g><g fill='%231b1b2f'><rect x='6' y='6' width='4' height='4'/></g></svg>");
        }

        /* "GAME MODES" button — continues the row after exit. Opens the
           modes-voting menu. */
        #extra-btns {
            display: flex;
            gap: 8px;
        }
        #modes-btn {
            height: 34px;
            padding: 0 12px;
            font-size: 10px;
        }
        /* Lit up while any mode is currently live. */
        #modes-btn.active {
            border-color: #ff5555;
            color: #ff5555;
        }
        #music-btn.off .music-icon {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'><rect x='1' y='6' width='2' height='4' fill='%23888'/><rect x='3' y='5' width='2' height='6' fill='%23888'/><rect x='5' y='4' width='2' height='8' fill='%23888'/><rect x='7' y='2' width='2' height='12' fill='%23888'/><rect x='10' y='4' width='2' height='2' fill='%23ff5555'/><rect x='14' y='4' width='2' height='2' fill='%23ff5555'/><rect x='12' y='6' width='2' height='2' fill='%23ff5555'/><rect x='10' y='8' width='2' height='2' fill='%23ff5555'/><rect x='14' y='8' width='2' height='2' fill='%23ff5555'/></svg>");
        }

        /* Top-left HUD stack — presence-server status + live FPS readout,
           side by side on wide screens so neither shifts the other around as
           its text changes. Narrow phones don't have the width to spare (it
           runs into the hearts/minimap cluster on the right), so it switches
           to a column — server status on top, FPS below it — instead. */
        #topleft-hud {
            position: fixed;
            top: 24px;
            left: 20px;
            z-index: 1500;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 6px;
            max-width: calc(100vw - 40px);
            pointer-events: none;
        }
        #server-status, #fps-counter {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            height: 34px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            padding: 0 10px;
            background: #1b1b2f;
            border: 3px solid #6a6a78;
            box-shadow: 4px 4px 0 #000;
            color: #6a6a78;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            #topleft-hud { flex-direction: column; align-items: flex-start; }
            #server-status, #fps-counter { font-size: 8px; padding: 0 6px; }
        }
        #server-status.active {
            border-color: #c6ff33;
            color: #c6ff33;
        }
        #server-status.inactive {
            border-color: #ff5555;
            color: #ff5555;
        }
        /* FPS counter: green >=50, yellow 30-49, red <30 — same thresholds a
           browser devtools FPS meter uses. */
        #fps-counter.good {
            border-color: #c6ff33;
            color: #c6ff33;
        }
        #fps-counter.warn {
            border-color: #ffcc33;
            color: #ffcc33;
        }
        #fps-counter.bad {
            border-color: #ff5555;
            color: #ff5555;
        }

        /* Rolling 24h unique-visitor chart — top-right, under the hearts,
           left of the minimap. */
        #stats-hud {
            position: fixed;
            top: 66px;
            right: 186px;
            z-index: 1500;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            pointer-events: none;
        }
        #stats-chart-box {
            width: 200px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.55);
            border: 3px solid #ffffff;
            box-shadow: 4px 4px 0 #000;
            padding: 6px 6px 4px;
        }
        #stats-peak {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #ffffff;
            text-align: right;
            margin-bottom: 2px;
        }
        #stats-svg {
            display: block;
            width: 100%;
            height: 80px;
        }
        .stats-axis {
            stroke: #ffffff;
            stroke-width: 1;
        }
        #stats-line {
            fill: none;
            stroke: url(#stats-rainbow);
            stroke-width: 2;
        }
        #stats-total {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.55);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #c6ff33;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.7);
        }
        @media (max-width: 600px) {
            #stats-hud { top: 192px; right: 20px; }
        }

        /* ---- Player hearts (top-right, just left of the minimap camera) ---- */
        #hearts-hud {
            position: fixed;
            top: 24px;
            right: 186px;          /* minimap is 150px wide, inset 20px from the right edge */
            display: flex;
            gap: 8px;
            z-index: 1500;
            pointer-events: none;
        }
        /* Chunky stepped "pixel-rounded" corners shared by the glass HUD chips
           (hearts + scores) — replaces the smooth border-radius glass, which
           clashed with the pixel art it was covering. */
        .heart {
            position: relative;
            width: 34px;
            height: 34px;
            image-rendering: pixelated;
            background: center / 74% no-repeat;
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 7 7' shape-rendering='crispEdges'><g fill='%23ff3b3b'><rect x='1' width='2' height='1'/><rect x='4' width='2' height='1'/><rect y='1' width='7' height='3'/><rect x='1' y='4' width='5' height='1'/><rect x='2' y='5' width='3' height='1'/><rect x='3' y='6' width='1' height='1'/></g></svg>");
            /* Pixelated glass backing: still translucent, but hard-edged —
               stepped corners, no blur, hard offset shadow. */
            background-color: rgba(255, 90, 120, 0.18);
            border: 2px solid rgba(255, 255, 255, 0.4);
            clip-path: polygon(0 8px, 4px 8px, 4px 4px, 8px 4px, 8px 0, calc(100% - 8px) 0, calc(100% - 8px) 4px, calc(100% - 4px) 4px, calc(100% - 4px) 8px, 100% 8px, 100% calc(100% - 8px), calc(100% - 4px) calc(100% - 8px), calc(100% - 4px) calc(100% - 4px), calc(100% - 8px) calc(100% - 4px), calc(100% - 8px) 100%, 8px 100%, 8px calc(100% - 4px), 4px calc(100% - 4px), 4px calc(100% - 8px), 0 calc(100% - 8px));
            box-sizing: border-box;

            content: "";

            pointer-events: none;
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.5) 22%,

            box-shadow: 4px 4px 0 #000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .modes-close:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 #000; }

        /* ---- GAME OVER overlay ---- */
        #game-over {
            position: fixed;
            inset: 0;
            z-index: 6000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 34px;
            padding: 24px;
            background: rgba(0, 0, 0, 0.9);
            font-family: 'Press Start 2P', monospace;
            -webkit-tap-highlight-color: transparent;
        }
        #game-over-title {
            font-size: clamp(28px, 9vw, 64px);
            color: #ff3b3b;
            text-shadow: 4px 4px 0 #000, 0 0 18px rgba(255, 59, 59, 0.7);
            letter-spacing: 2px;
            text-align: center;
        }
        #game-over-btns {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #restart-btn, #game-over-exit {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 16px 20px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            color: #e8e8e8;
            background: #12121e;
            border: 3px solid #44445a;
            box-shadow: 5px 5px 0 #000;
        }
        #game-over-exit:active, #restart-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #000; }
        .restart-secs { color: #fff; }
        /* Glowing rainbow pixel border that cycles hues around the restart button */
        #restart-btn {
            position: relative;
            border-color: transparent;
            background:
                linear-gradient(#12121e, #12121e) padding-box,
                conic-gradient(from 0deg, #ff2d55, #ff9500, #ffe500, #34d158, #00c7ff, #5e5ce6, #ff2dd4, #ff2d55) border-box;
            animation: restart-rainbow 1.4s linear infinite, restart-glow 1.4s linear infinite;
        }
        @keyframes restart-rainbow { to { filter: hue-rotate(360deg); } }
        @keyframes restart-glow {
            0%, 100% { box-shadow: 5px 5px 0 #000, 0 0 14px rgba(255, 120, 220, 0.7); }
            50%      { box-shadow: 5px 5px 0 #000, 0 0 24px rgba(120, 200, 255, 0.9); }
        }
        @media (prefers-reduced-motion: reduce) {
            #restart-btn { animation: none; }
        }

        /* Transient pixel toast (e.g. first-time DOOM controls hint) */
        #hud-toast {
            position: fixed;
            left: 50%;
            top: 16%;
            transform: translateX(-50%);
            z-index: 3800;
            display: none;
            max-width: 80vw;
            padding: 12px 14px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            line-height: 1.8;
            text-align: center;
            color: #c6ff33;
            background: rgba(18, 18, 30, 0.95);
            border: 3px solid #c6ff33;
            box-shadow: 4px 4px 0 #000;
            pointer-events: none;
        }
        #hud-toast.show { display: block; }

        /* Close button for the orb modal (replaces the ESC key sprite hint) */
        #modal-close {
            position: absolute;
            top: 10px;
            right: 12px;
            width: 34px;
            height: 34px;
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            color: #c6ff33;
            background: #1b1b2f;
            border: 2px solid #c6ff33;
            box-shadow: 3px 3px 0 #000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #modal-close:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

        #project-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            image-rendering: pixelated;
        }

        /* this is the css for the modal popup */
        .modal-content {
            position: relative;
            background: #111;
            padding: 20px;
            border: 2px solid white;
            text-align: center;
            max-width: 90vw;
            box-shadow: 0 0 10px white;
            color: white;
        }

        .modal-content h1,
        .modal-content p {
            font-size: 12px;
            margin-bottom: 10px;
        }

        .modal-content iframe {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 16 / 9;
            height: auto;
            border: none;
        }

        /* ============================================================
           Game loading overlay — covers the black canvas gap while
           MainScene.preload() pulls in its spritesheets. A pixel dial
           (8 blocks lighting up in sequence, rainbow-coded) plus a real
           progress bar driven by Phaser's own load-progress events.
           ============================================================ */
        #game-loading {
            position: fixed;
            inset: 0;
            z-index: 8500;
            display: none;
            align-items: center;
            justify-content: center;
            background: #05050a;
            font-family: 'Press Start 2P', monospace;
        }
        #game-loading.show { display: flex; }
        .loading-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 26px;
        }
        .loading-spinner {
            position: relative;
            width: 72px;
            height: 72px;
        }
        .loading-spinner i {
            position: absolute;
            width: 14px;
            height: 14px;
            top: 29px;
            left: 29px;
            image-rendering: pixelated;
            box-shadow: 0 0 0 2px #000;
            opacity: 0.25;
            animation: loadingPulse 1.05s steps(1) infinite;
        }
        .loading-spinner i:nth-child(1) { --c: #ff2d55; transform: translate(0, -29px);      animation-delay: 0.000s; }
        .loading-spinner i:nth-child(2) { --c: #ff9500; transform: translate(20px, -20px);    animation-delay: 0.131s; }
        .loading-spinner i:nth-child(3) { --c: #ffe500; transform: translate(29px, 0);        animation-delay: 0.262s; }
        .loading-spinner i:nth-child(4) { --c: #34d158; transform: translate(20px, 20px);     animation-delay: 0.393s; }
        .loading-spinner i:nth-child(5) { --c: #00c7ff; transform: translate(0, 29px);        animation-delay: 0.524s; }
        .loading-spinner i:nth-child(6) { --c: #5e5ce6; transform: translate(-20px, 20px);    animation-delay: 0.655s; }
        .loading-spinner i:nth-child(7) { --c: #ff2dd4; transform: translate(-29px, 0);       animation-delay: 0.786s; }
        .loading-spinner i:nth-child(8) { --c: #ff2d55; transform: translate(-20px, -20px);   animation-delay: 0.917s; }
        @keyframes loadingPulse {
            0%   { background: var(--c); opacity: 1; box-shadow: 0 0 0 2px #000, 0 0 12px var(--c); }
            30%  { background: var(--c); opacity: 0.25; box-shadow: 0 0 0 2px #000; }
            100% { background: var(--c); opacity: 0.25; box-shadow: 0 0 0 2px #000; }
        }
        .loading-label {
            color: #c6ff33;
            font-size: 12px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #000;
        }
        .loading-bar {
            width: 220px;
            height: 16px;
            background: #1b1b2f;
            border: 3px solid #c6ff33;
            box-shadow: 4px 4px 0 #000;
            box-sizing: border-box;
            padding: 2px;
            image-rendering: pixelated;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: repeating-linear-gradient(90deg, #c6ff33 0 6px, #9ee81f 6px 12px);
            transition: width 0.15s steps(10);
        }
        /* Rainbow pixels orbiting off the spinner while it's shown */
        .loading-particle {
            position: fixed;
            image-rendering: pixelated;
            pointer-events: none;
            z-index: 8501;
            animation: loadingSparkFly 0.8s ease-out forwards;
        }
        @keyframes loadingSparkFly {
            0%   { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx, 0), var(--dy, 0)) scale(0.2); }
        }

        /* ---- Light theme (gear icon → THEME) ----
           Restyles the DOM chrome (HUD buttons/panels/toasts/modals) to a
           bright pixel look. The Phaser game world itself (sprites, tiles,
           the raycast DOOM view) keeps its normal art — this is a UI-chrome
           theme swap, not a re-skin of the game's pixel art. */
        body.theme-light .pixel-hud-btn {
            color: #2d6b1c;
            background: #f4f7e8;
            border-color: #2d6b1c;
        }
        body.theme-light #zombie-btn.on { border-color: #b23a3a; color: #b23a3a; }
        body.theme-light #cowboy-btn.on { border-color: #a86a1a; color: #a86a1a; }
        body.theme-light #cowgirl-btn.on { border-color: #c23a7a; color: #c23a7a; }
        body.theme-light .music-icon,
        body.theme-light .sfx-icon path,
        body.theme-light .gear-icon rect { filter: hue-rotate(0deg); }
        body.theme-light #server-status, body.theme-light #fps-counter {
            background: #f4f7e8;
            color: #4a4a5a;
            border-color: #9a9aa8;
        }
        body.theme-light #server-status.active, body.theme-light #fps-counter.good { border-color: #2d6b1c; color: #2d6b1c; }
        body.theme-light #server-status.inactive, body.theme-light #fps-counter.bad { border-color: #b23a3a; color: #b23a3a; }
        body.theme-light #score-hud, body.theme-light #zscore-hud,
        body.theme-light #cscore-hud, body.theme-light #gscore-hud {
            background-color: rgba(255, 255, 255, 0.75);
            border-color: rgba(0, 0, 0, 0.25);
            color: #2d6b1c;
            text-shadow: none;
        }
        body.theme-light #stats-chart-box { background: rgba(255, 255, 255, 0.75); border-color: #2d2d3a; }
        body.theme-light #stats-peak { color: #2d2d3a; }
        body.theme-light #stats-total { background: rgba(255, 255, 255, 0.75); color: #2d6b1c; text-shadow: none; }
        body.theme-light #hud-toast {
            background: rgba(244, 247, 232, 0.97);
            color: #2d6b1c;
            border-color: #2d6b1c;
        }
        body.theme-light .tutorial-card, body.theme-light .settings-card {
            background: #f4f7e8;
            border-color: #2d6b1c;
            color: #2d2d3a;
        }
        body.theme-light .tutorial-card h2, body.theme-light .settings-card h2 { color: #2d6b1c; }
        body.theme-light .tutorial-key {
            background: #ffffff;
            border-color: #2d6b1c;
            color: #2d6b1c;
        }
        body.theme-light .tutorial-note, body.theme-light .settings-label { color: #6a6a78; }
        body.theme-light .tutorial-start, body.theme-light .settings-close {
            background: #2d6b1c;
            color: #f4f7e8;
        }
        body.theme-light .settings-choice-btn {
            background: #ffffff;
            color: #2d6b1c;
            border-color: #b8c8a8;
        }
        body.theme-light .settings-choice-btn.active {
            border-color: #2d6b1c;
            box-shadow: 3px 3px 0 #000, 0 0 10px rgba(45, 107, 28, 0.4);
        }
        /* Remaining neon-green chrome that the block above missed: the persistent
           2D⇄3D toggle, the Game Modes panel, the settings help chip, and the
           modal close — all recolored to the same dark-green-on-cream look. */
        body.theme-light #mode-toggle {
            color: #2d6b1c;
            background: #f4f7e8;
            border-color: #2d6b1c;
        }
        body.theme-light .settings-help {
            color: #2d6b1c;
            border-color: #2d6b1c;
        }
        body.theme-light #modal-close {
            color: #2d6b1c;
            border-color: #2d6b1c;
        }
        body.theme-light .modes-card {
            background: #f4f7e8;
            border-color: #2d6b1c;
            color: #2d2d3a;
        }
        body.theme-light .modes-card h2 { color: #2d6b1c; }
        body.theme-light .modes-note { color: #6a6a78; }
        body.theme-light .mode-row { background: #ffffff; border-color: #b8c8a8; }
        body.theme-light .mode-name { color: #2d6b1c; }
        body.theme-light .vote-btn { background: #ffffff; border-color: #b8c8a8; }
        body.theme-light .vote-btn .vote-count { color: #2d2d3a; }
        body.theme-light .modes-close {
            background: #2d6b1c;
            color: #f4f7e8;
        }
    </style>
</head>
<body>
    <!-- Visitor gate: shown before entry unless a choice is already saved -->
    <!-- Game loading overlay: shown while MainScene.preload() fetches its
         spritesheets, hidden once the world HUD is built (hud-ready). -->
    <div id="game-loading">
        <div class="loading-inner">
            <div class="loading-spinner" aria-hidden="true">
                <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
            <div class="loading-label">LOADING&hellip;</div>
            <div class="loading-bar"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
        </div>
    </div>
    <script>
        (function () {
            var overlay = document.getElementById('game-loading');
            var spinner = overlay.querySelector('.loading-spinner');
            var fill = document.getElementById('loading-bar-fill');
            var rainbow = ['#ff2d55', '#ff9500', '#ffe500', '#34d158', '#00c7ff', '#5e5ce6', '#ff2dd4'];
            var sparkTimer = null;

            function spawnLoadingSparks() {
                var r = spinner.getBoundingClientRect();
                var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
                for (var i = 0; i < 2; i++) {
                    var angle = Math.random() * Math.PI * 2;
                    var dist = 30 + Math.random() * 55;
                    var p = document.createElement('div');
                    p.className = 'loading-particle';
                    var size = 3 + Math.floor(Math.random() * 4);
                    p.style.width = p.style.height = size + 'px';
                    var col = rainbow[Math.floor(Math.random() * rainbow.length)];
                    p.style.background = col;
                    p.style.boxShadow = '0 0 5px ' + col;
                    p.style.left = (cx + Math.cos(angle) * 36) + 'px';
                    p.style.top = (cy + Math.sin(angle) * 36) + 'px';
                    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(0) + 'px');
                    p.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(0) + 'px');
                    p.addEventListener('animationend', function () { this.remove(); });
                    document.body.appendChild(p);
                }
            }

            // Real progress only — driven by MainScene's Phaser load events,
            // never a fake timer.
            window.showGameLoading = function () {
                if (fill) fill.style.width = '0%';
                overlay.classList.add('show');
                clearInterval(sparkTimer);
                sparkTimer = setInterval(spawnLoadingSparks, 120);
            };
            window.updateGameLoading = function (progress) {
                if (fill) fill.style.width = Math.round(progress * 100) + '%';
            };
            window.hideGameLoading = function () {
                overlay.classList.remove('show');
                clearInterval(sparkTimer);
                sparkTimer = null;
            };
        })();
    </script>

    <div id="project-modal" style="display: none;">
        <div class="modal-content">
          <button id="modal-close" aria-label="Close">X</button>
          <h1 id="modal-title"></h1>
          <p id="modal-description"></p>
          <iframe id="modal-video" width="320" height="180" src="" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>

    <!-- Load Phaser first -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>

    <!-- Then load your game -->
    <script type="module" src="src/game.js"></script>

</body>
</html>
