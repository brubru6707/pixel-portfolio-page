    <style>
        /*
         * Layering plan (fixes game-world-over-iframe bugs):
         *   canvas (game world)        z: auto (bottom)
         *   .world-preview             z: 5    (small in-world previews)
         *   #mode-toggle               z: 1500
         *   #project-modal             z: 2000
         *   .subpage-frame             z: 3000 (full "sub-page")
         *   .subpage-esc               z: 3500 (back button)
         */
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        img {
            image-rendering: pixelated;
        }

        /* Small in-world previews (subdomain iframes/snapshots + computer screen) */
        .world-preview {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            border: 2px solid white;
            background-color: #000;
            transition: box-shadow 0.7s ease;
        }
        body.mode-3d .world-preview {
            box-shadow: 3px 3px 0 #6a6a6a, 6px 6px 0 #4c4c4c, 9px 9px 0 #303030;
        }
        body.mode-3d .world-preview--scaled {
            /* These live inside a scale() transform, so shadows need bigger px values */
            box-shadow: 14px 14px 0 #6a6a6a, 28px 28px 0 #4c4c4c, 42px 42px 0 #303030;
        }
        /* Never let world previews bleed over an open sub-page or modal */
        body.subpage-open .world-preview,
        body.modal-open .world-preview {
            display: none !important;
        }
        body.subpage-open #mode-toggle,
        body.modal-open #mode-toggle {
            display: none;
        }

        /* First-person (DOOM) mode: the raycaster overlay owns the screen, so
           hide the DOM world previews behind it. Also hide the overlay + its
           slider panel whenever a sub-page or modal is open. */
        body.mode-doom .world-preview {
            display: none !important;
        }
        body.subpage-open #doom-canvas,
        body.modal-open #doom-canvas,
        body.subpage-open #doom-controls,
        body.modal-open #doom-controls {
            display: none !important;
        }

        /* Full-screen sub-page shown after cutting down an entity */
        .subpage-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background: #000;
            z-index: 3000;
        }
        /* Clean pixel "BACK" button for sub-pages (replaces the esc-key image) */
        .subpage-back {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            right: 16px;
            z-index: 3500;
            padding: 12px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* 2D / 3D world mode toggle */
        #mode-toggle {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: 20px;
            width: 64px;
            height: 64px;
            z-index: 1500;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            line-height: 1;
            color: #c6ff33;
            background: #1b1b2f;
            border: 3px solid #c6ff33;
            box-shadow: 4px 4px 0 #000;
            cursor: pointer;
            image-rendering: pixelated;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #mode-toggle:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0 #000;
        }
        /* Clean "flip to the other dimension" instead of the old 360 spin */
        #mode-toggle.flipping {
            animation: modeFlip 0.3s ease;
        }
        @keyframes modeFlip {
            0%   { transform: perspective(240px) rotateY(0deg); }
            50%  { transform: perspective(240px) rotateY(90deg); }
            100% { transform: perspective(240px) rotateY(0deg); }
        }
        @media (max-width: 600px) {
            #mode-toggle {
                width: 52px;
                height: 52px;
                font-size: 11px;
            }
        }

        /* ---------------------------------------------------------------
           Stable DOM HUD (replaces the buggy floating F / ESC Phaser
           sprites). Fixed positions instead of per-frame repositioning.
           --------------------------------------------------------------- */
        .pixel-hud-btn {
            font-family: 'Press Start 2P', monospace;
            color: #c6ff33;
            background: #1b1b2f;
            border: 3px solid #c6ff33;
            box-shadow: 4px 4px 0 #000;
            image-rendering: pixelated;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .pixel-hud-btn:active,
        .pixel-hud-btn.pressed {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0 #000;
        }

        /* Action / chop button — the universal "interact" control */
        #action-btn {
            position: fixed;
            bottom: max(96px, calc(env(safe-area-inset-bottom) + 96px));
            right: 20px;
            width: 76px;
            height: 76px;
            font-size: 28px;
            z-index: 1500;
            flex-direction: column;
            gap: 3px;
            line-height: 1;
        }
        #action-btn .action-label {
            font-size: 8px;
            color: #7ea82a;
        }
        /* Axe icon cropped from the first frame of the 4-frame axe spritesheet
           (48x15). Used instead of a ⚔ glyph, which the pixel font lacks. */
        .axe-icon {
            display: inline-block;
            height: 1.2em;
            aspect-ratio: 12 / 15;
            vertical-align: middle;
            background: url('assets/axe.png') left center / auto 100% no-repeat;
            image-rendering: pixelated;
        }
        #action-btn .axe-icon { height: 34px; }
        .tutorial-key .axe-icon { height: 26px; }
        .tutorial-row b .axe-icon { height: 15px; }
        /* Subtle highlight when in range (the real "you can chop" cue is the
           stream of little green particles flowing out of the button — see
           .axe-particle below, spawned from JS). */
        #action-btn.hint {
            color: #eaffb0;
            border-color: #eaffb0;
        }
        #action-btn.hint .action-label { color: #eaffb0; }

        /* Little green pixels that flow out of the action button while it glows */
        .axe-particle {
            position: fixed;
            background: #c6ff33;
            box-shadow: 0 0 3px #c6ff33;
            image-rendering: pixelated;
            pointer-events: none;
            z-index: 1499;
            animation: axeParticleFly 0.85s ease-out forwards;
        }
        @keyframes axeParticleFly {
            0%   { opacity: 0; transform: translate(0, 0) scale(1); }
            18%  { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--dx, 0), var(--dy, -60px)) scale(0.25); }
        }
        @media (max-width: 600px) {
            #action-btn { width: 66px; height: 66px; font-size: 24px; }
        }

        /* DOOM first-person on-screen movement pad (touch devices, 3D only) */
        #doom-touch {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 20px;
            z-index: 1500;
            display: none;
            grid-template-columns: repeat(3, 58px);
            grid-template-rows: repeat(3, 58px);
            gap: 6px;
        }
        #doom-touch .pixel-hud-btn { font-size: 22px; }
        #doom-touch [data-doom="fwd"]   { grid-area: 1 / 2; }
        #doom-touch [data-doom="left"]  { grid-area: 2 / 1; }
        #doom-touch [data-doom="right"] { grid-area: 2 / 3; }
        #doom-touch [data-doom="back"]  { grid-area: 3 / 2; }
        body.touch.mode-doom #doom-touch { display: grid; }
        @media (max-width: 600px) {
            #doom-touch { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
        }

        /* Small "?" button to reopen the controls tutorial (2D only) */
        #help-btn {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 20px;
            width: 44px;
            height: 44px;
            font-size: 18px;
            z-index: 1500;
        }
        body.mode-doom #help-btn { display: none; }

        /* Music on/off toggle — sits right next to the "?" button */
        #music-btn {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 74px;
            width: 44px;
            height: 44px;
            padding: 0;
            z-index: 1500;
        }
        body.mode-doom #music-btn { display: none; }
        .music-icon {
            display: inline-block;
            width: 26px;
            height: 26px;
            background: center / contain no-repeat;
            /* Chunky pixel-block speaker: a stepped cone made of square blocks
               plus two blocky sound-waves — reads as retro pixel art, not a
               thin vector line. */
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'><rect x='1' y='6' width='2' height='4' fill='%23c6ff33'/><rect x='3' y='5' width='2' height='6' fill='%23c6ff33'/><rect x='5' y='4' width='2' height='8' fill='%23c6ff33'/><rect x='7' y='2' width='2' height='12' fill='%23c6ff33'/><rect x='10' y='6' width='2' height='4' fill='%23c6ff33'/><rect x='13' y='4' width='2' height='8' fill='%23c6ff33'/></svg>");
        }
        #music-btn.off {
            border-color: #6a6a78;
            color: #6a6a78;
        }

        /* SFX mute toggle — footsteps/chop/smash/etc., independent of music.
           Sits right after the music button. */
        #sfx-btn {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 128px;
            width: 44px;
            height: 44px;
            padding: 0;
            z-index: 1500;
        }
        body.mode-doom #sfx-btn { display: none; }
        .sfx-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: center / contain no-repeat;
            /* Speaker cone + equalizer bars — distinct from music's curved
               sound-wave icon, since this mutes chop/footstep/smash SFX, not
               the chiptune loop. */
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M1 6 L4 6 L8 2 L8 14 L4 10 L1 10 Z' fill='%23c6ff33'/><rect x='10' y='6' width='1.4' height='4' fill='%23c6ff33'/><rect x='12.4' y='4' width='1.4' height='8' fill='%23c6ff33'/><rect x='14.8' y='7' width='1.2' height='2' fill='%23c6ff33'/></svg>");
        }
        #sfx-btn.off {
            border-color: #6a6a78;
            color: #6a6a78;
        }
        #sfx-btn.off .sfx-icon {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M1 6 L4 6 L8 2 L8 14 L4 10 L1 10 Z' fill='%23888'/><path d='M10 4 L15 12' stroke='%23ff5555' stroke-width='1.7'/><path d='M15 4 L10 12' stroke='%23ff5555' stroke-width='1.7'/></svg>");
        }

        /* Exit button — clears the visitor choice + reloads. Next to the SFX btn. */
        #exit-btn {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 182px;
            height: 44px;
            padding: 0 12px;
            font-size: 12px;
            z-index: 1500;
        }
        body.mode-doom #exit-btn { display: none; }

        /* Zombies + cowboy toggles — continue the bottom-left row after exit */
        #extra-btns {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            left: 264px;
            display: flex;
            gap: 8px;
            z-index: 1500;
        }
        body.mode-doom #extra-btns { display: none; }
        #zombie-btn {
            height: 44px;
            padding: 0 12px;
            font-size: 10px;
        }
        #zombie-btn.on {
            border-color: #ff5555;
            color: #ff5555;
        }
        /* Small screens: the bottom row runs out of width — lift the extra
           buttons one row up, above the ? / music / exit row. */
        @media (max-width: 600px) {
            #extra-btns {
                left: 20px;
                bottom: max(76px, calc(env(safe-area-inset-bottom) + 76px));
                flex-wrap: wrap;          /* zombies? + cowboy? */
                max-width: calc(100vw - 120px);
            }
        }
        #music-btn.off .music-icon {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'><rect x='1' y='6' width='2' height='4' fill='%23888'/><rect x='3' y='5' width='2' height='6' fill='%23888'/><rect x='5' y='4' width='2' height='8' fill='%23888'/><rect x='7' y='2' width='2' height='12' fill='%23888'/><rect x='10' y='4' width='2' height='2' fill='%23ff5555'/><rect x='14' y='4' width='2' height='2' fill='%23ff5555'/><rect x='12' y='6' width='2' height='2' fill='%23ff5555'/><rect x='10' y='8' width='2' height='2' fill='%23ff5555'/><rect x='14' y='8' width='2' height='2' fill='%23ff5555'/></svg>");
        }

        /* Presence-server status — top-left, passive readout (not a button) of
           the live WebSocket connection to the EC2 presence server. */
        #server-status {
            position: fixed;
            top: 24px;
            left: 20px;
            z-index: 1500;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 12px;
            background: #1b1b2f;
            border: 3px solid #6a6a78;
            box-shadow: 4px 4px 0 #000;
            color: #6a6a78;
            pointer-events: none;
        }
        #server-status.active {
            border-color: #c6ff33;
            color: #c6ff33;
        }
        #server-status.inactive {
            border-color: #ff5555;
            color: #ff5555;
        }

        /* Rolling 24h unique-visitor chart — top-right, under the hearts,
           left of the minimap. */
        #stats-hud {
            position: fixed;
            top: 66px;
            right: 186px;
            z-index: 1500;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            pointer-events: none;
        }
        #stats-chart-box {
            width: 200px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.55);
            border: 3px solid #ffffff;
            box-shadow: 4px 4px 0 #000;
            padding: 6px 6px 4px;
        }
        #stats-peak {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #ffffff;
            text-align: right;
            margin-bottom: 2px;
        }
        #stats-svg {
            display: block;
            width: 100%;
            height: 80px;
        }
        .stats-axis {
            stroke: #ffffff;
            stroke-width: 1;
        }
        #stats-line {
            fill: none;
            stroke: url(#stats-rainbow);
            stroke-width: 2;
        }
        #stats-total {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.55);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #c6ff33;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.7);
        }
        @media (max-width: 600px) {
            #stats-hud { top: 192px; right: 20px; }
        }

        /* ---- Player hearts (top-right, just left of the minimap camera) ---- */
        #hearts-hud {
            position: fixed;
            top: 24px;
            right: 186px;          /* minimap is 150px wide, inset 20px from the right edge */
            display: flex;
            gap: 8px;
            z-index: 1500;
            pointer-events: none;
        }
        /* Chunky stepped "pixel-rounded" corners shared by the glass HUD chips
           (hearts + scores) — replaces the smooth border-radius glass, which
           clashed with the pixel art it was covering. */
        .heart {
            position: relative;
            width: 34px;
            height: 34px;
            image-rendering: pixelated;
            background: center / 74% no-repeat;
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 7 7' shape-rendering='crispEdges'><g fill='%23ff3b3b'><rect x='1' width='2' height='1'/><rect x='4' width='2' height='1'/><rect y='1' width='7' height='3'/><rect x='1' y='4' width='5' height='1'/><rect x='2' y='5' width='3' height='1'/><rect x='3' y='6' width='1' height='1'/></g></svg>");
            /* Pixelated glass backing: still translucent, but hard-edged —
               stepped corners, no blur, hard offset shadow. */
            background-color: rgba(255, 90, 120, 0.18);
            border: 2px solid rgba(255, 255, 255, 0.4);
            clip-path: polygon(0 8px, 4px 8px, 4px 4px, 8px 4px, 8px 0, calc(100% - 8px) 0, calc(100% - 8px) 4px, calc(100% - 4px) 4px, calc(100% - 4px) 8px, 100% 8px, 100% calc(100% - 8px), calc(100% - 4px) calc(100% - 8px), calc(100% - 4px) calc(100% - 4px), calc(100% - 8px) calc(100% - 4px), calc(100% - 8px) 100%, 8px 100%, 8px calc(100% - 4px), 4px calc(100% - 4px), 4px calc(100% - 8px), 0 calc(100% - 8px));
            box-sizing: border-box;
            filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.55)) drop-shadow(0 0 6px rgba(255, 59, 59, 0.35));
            transition: transform 0.1s;
        }
        /* Hard-stepped sheen banding across the top of the glass (no smooth
           gradient — three flat bands, like light on pixel glass). */
        .heart::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.5) 22%,
                rgba(255, 255, 255, 0.18) 22%, rgba(255, 255, 255, 0.18) 44%,
                rgba(255, 255, 255, 0) 44%);
        }
        /* Half heart: left half still red, right half a dim husk */
        .heart.half {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 7 7' shape-rendering='crispEdges'><defs><clipPath id='l'><rect x='0' y='0' width='3.5' height='7'/></clipPath></defs><g fill='%23492030'><rect x='1' width='2' height='1'/><rect x='4' width='2' height='1'/><rect y='1' width='7' height='3'/><rect x='1' y='4' width='5' height='1'/><rect x='2' y='5' width='3' height='1'/><rect x='3' y='6' width='1' height='1'/></g><g fill='%23ff3b3b' clip-path='url(%23l)'><rect x='1' width='2' height='1'/><rect x='4' width='2' height='1'/><rect y='1' width='7' height='3'/><rect x='1' y='4' width='5' height='1'/><rect x='2' y='5' width='3' height='1'/><rect x='3' y='6' width='1' height='1'/></g></svg>");
        }
        /* Empty slot: dim, greyed-out husk left behind after a heart blows */
        .heart.lost {
            filter: grayscale(1) brightness(0.45) drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.6));
            opacity: 0.5;
        }
        /* Pop-and-shrink when a bomb destroys this heart */
        .heart.exploding { animation: heartExplode 0.42s steps(7) forwards; }
        @keyframes heartExplode {
            0%   { transform: scale(1)   rotate(0deg);  opacity: 1; }
            30%  { transform: scale(1.7) rotate(-10deg); opacity: 1; }
            60%  { transform: scale(2)   rotate(12deg);  opacity: 1; }
            100% { transform: scale(0.1) rotate(0deg);   opacity: 0; }
        }
        /* Red pixels bursting out of the heart when it explodes */
        .heart-particle {
            position: fixed;
            image-rendering: pixelated;
            pointer-events: none;
            z-index: 1600;
            animation: heartParticleFly 0.7s ease-out forwards;
        }
        @keyframes heartParticleFly {
            0%   { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx, 0), var(--dy, 0)) scale(0.2); }
        }

        /* ---- Tree-cut score (persisted), sits just left of the hearts ---- */
        #score-hud, #zscore-hud, #cscore-hud {
            position: fixed;
            top: 24px;
            height: 34px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px 0 8px;
            z-index: 1500;
            pointer-events: none;
            background-color: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-sizing: border-box;

<body>
    <!-- Visitor gate: shown before entry unless a choice is already saved -->
    <div id="visitor-gate">
        <div class="gate-inner">
            <h1 class="gate-title">which portfolio:</h1>
            <div class="gate-buttons">
                <button class="gate-btn gate-btn--recruiter" data-visitor="recruiter">Regular</button>
                <button class="gate-btn gate-btn--everyone" data-visitor="everyone">Regular, but with PIXELS</button>
            </div>
        </div>
    </div>
    <script>
        (function () {
            var gate = document.getElementById('visitor-gate');
            var PERSONAL = 'personalWebsite/index.html';
            // NOTE: routing on load lives in IntroScene now — the intro animation
            // always plays first, and only when it finishes is this gate revealed
            // (via window.showVisitorGate, below) or the saved choice auto-routed.
            var title = gate.querySelector('.gate-title');
            var everyone = gate.querySelector('.gate-btn--everyone');
            var rainbow = ['#ff2d55', '#ff9500', '#ffe500', '#34d158', '#00c7ff', '#5e5ce6', '#ff2dd4'];
            var sparkTimer = null;
            var everyoneCb = null;   // set by showVisitorGate: starts the game

            // Spray rainbow pixels from around the title + the hovered button.
            function spawnSparks() {
                if (!gate.classList.contains('gate-pixel')) return;
                [title, everyone].forEach(function (el) {
                    var r = el.getBoundingClientRect();
                    var per = 2 * (r.width + r.height);
                    for (var i = 0; i < 3; i++) {
                        var d = Math.random() * per, x, y, nx, ny;
                        if (d < r.width) { x = r.left + d; y = r.top; nx = 0; ny = -1; }
                        else if (d < r.width + r.height) { x = r.right; y = r.top + (d - r.width); nx = 1; ny = 0; }
                        else if (d < 2 * r.width + r.height) { x = r.right - (d - r.width - r.height); y = r.bottom; nx = 0; ny = 1; }
                        else { x = r.left; y = r.bottom - (d - 2 * r.width - r.height); nx = -1; ny = 0; }
                        var p = document.createElement('div');
                        p.className = 'gate-spark';
                        var size = 3 + Math.floor(Math.random() * 5);
                        p.style.width = p.style.height = size + 'px';
                        var col = rainbow[Math.floor(Math.random() * rainbow.length)];
                        p.style.background = col;
                        p.style.boxShadow = '0 0 6px ' + col;
                        p.style.left = x + 'px';
                        p.style.top = y + 'px';
                        var dist = 16 + Math.random() * 40, spread = (Math.random() - 0.5) * 30;
                        p.style.setProperty('--dx', (nx * dist + (ny !== 0 ? spread : 0)).toFixed(0) + 'px');
                        p.style.setProperty('--dy', (ny * dist + (nx !== 0 ? spread : 0)).toFixed(0) + 'px');
                        p.addEventListener('animationend', function () { this.remove(); });
                        document.body.appendChild(p);
                    }
                });
            }

            everyone.addEventListener('mouseenter', function () {
                gate.classList.add('gate-pixel');
                clearInterval(sparkTimer);
                sparkTimer = setInterval(spawnSparks, 70);
                spawnSparks();
            });
            everyone.addEventListener('mouseleave', function () {
                gate.classList.remove('gate-pixel');
                clearInterval(sparkTimer);
                sparkTimer = null;
            });

            function choose(type) {
                try { localStorage.setItem('visitorType', type); } catch (e) {}
                clearInterval(sparkTimer);
                if (type === 'recruiter') {
                    // Straight to the personal site (rendered without the pixel font).
                    window.location.href = PERSONAL;
                    return;
                }
                // Everyone Else: fade the gate out, then start the game.
                gate.classList.add('hidden');
                setTimeout(function () {
                    gate.remove();
                    if (typeof everyoneCb === 'function') everyoneCb();
                }, 500);
            }
            gate.querySelectorAll('.gate-btn').forEach(function (b) {
                b.addEventListener('click', function () { choose(b.dataset.visitor); });
            });

            // Called by IntroScene once the intro animation completes (first-time
            // visitors only). Reveals the gate and remembers how to start the game.
            window.showVisitorGate = function (onEveryone) {
                everyoneCb = onEveryone || null;
                gate.classList.add('shown');
            };
        })();
    </script>

    <!-- Game loading overlay: shown while MainScene.preload() fetches its
         spritesheets, hidden once the world HUD is built (hud-ready). -->
    <div id="game-loading">
        <div class="loading-inner">
            <div class="loading-spinner" aria-hidden="true">
                <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
            <div class="loading-label">LOADING&hellip;</div>
            <div class="loading-bar"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
        </div>
    </div>
    <script>
        (function () {
            var overlay = document.getElementById('game-loading');
            var spinner = overlay.querySelector('.loading-spinner');
            var fill = document.getElementById('loading-bar-fill');
            var rainbow = ['#ff2d55', '#ff9500', '#ffe500', '#34d158', '#00c7ff', '#5e5ce6', '#ff2dd4'];
            var sparkTimer = null;

            function spawnLoadingSparks() {
                var r = spinner.getBoundingClientRect();
                var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
                for (var i = 0; i < 2; i++) {
                    var angle = Math.random() * Math.PI * 2;
                    var dist = 30 + Math.random() * 55;
                    var p = document.createElement('div');
                    p.className = 'loading-particle';
                    var size = 3 + Math.floor(Math.random() * 4);
                    p.style.width = p.style.height = size + 'px';
                    var col = rainbow[Math.floor(Math.random() * rainbow.length)];
                    p.style.background = col;
                    p.style.boxShadow = '0 0 5px ' + col;
                    p.style.left = (cx + Math.cos(angle) * 36) + 'px';
                    p.style.top = (cy + Math.sin(angle) * 36) + 'px';
                    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(0) + 'px');
                    p.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(0) + 'px');
                    p.addEventListener('animationend', function () { this.remove(); });
                    document.body.appendChild(p);
                }
            }

            // Real progress only — driven by MainScene's Phaser load events,
            // never a fake timer.
            window.showGameLoading = function () {
                if (fill) fill.style.width = '0%';
                overlay.classList.add('show');
                clearInterval(sparkTimer);
                sparkTimer = setInterval(spawnLoadingSparks, 120);
            };
            window.updateGameLoading = function (progress) {
                if (fill) fill.style.width = Math.round(progress * 100) + '%';
            };
            window.hideGameLoading = function () {
                overlay.classList.remove('show');
                clearInterval(sparkTimer);
                sparkTimer = null;
            };
        })();
    </script>

    <div id="project-modal" style="display: none;">
        <div class="modal-content">
          <button id="modal-close" aria-label="Close">X</button>
          <h1 id="modal-title"></h1>
          <p id="modal-description"></p>
          <iframe id="modal-video" width="320" height="180" src="" frameborder="0" allowfullscreen></iframe>
        </div>
      </div>

    <!-- Load Phaser first -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>

    <!-- Then load your game -->
    <script type="module" src="src/game.js"></script>
